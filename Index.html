<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFE6;
    --panel:#FFFFFF;
    --ink:#20261F;
    --muted:#6F7568;
    --accent:#3E6B52;
    --accent-soft:#E4EDE6;
    --warn:#B5502E;
    --line:#E2DDCC;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:460px;
    margin:0 auto;
    padding:28px 18px 60px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:0;
    letter-spacing:-0.01em;
  }
  header .today{
    font-size:13px;
    color:var(--muted);
  }

  .panel{
    background:var(--panel);
    border-radius:var(--radius);
    padding:22px 20px;
    margin-bottom:16px;
    border:1px solid var(--line);
  }

  /* --- 本月總花費（signature element）--- */
  .hero{
    text-align:center;
    padding:26px 20px 22px;
  }
  .hero .label{
    font-size:13px;
    color:var(--muted);
    letter-spacing:0.04em;
  }
  .hero .amount{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:52px;
    line-height:1.1;
    margin:4px 0 2px;
    font-variant-numeric:tabular-nums;
  }
  .hero .sub{
    font-size:13px;
    color:var(--muted);
  }

  /* --- 分類長條圖 --- */
  .breakdown h2, .recent h2, .add-form h2{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:600;
    margin:0 0 14px;
  }
  .bar-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    font-size:13px;
  }
  .bar-row .cat-name{
    width:56px;
    flex-shrink:0;
    color:var(--ink);
  }
  .bar-track{
    flex:1;
    height:10px;
    background:var(--accent-soft);
    border-radius:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    background:var(--accent);
    border-radius:6px;
    transition:width .4s ease;
  }
  .bar-row .cat-amount{
    width:64px;
    text-align:right;
    flex-shrink:0;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .empty-note{
    color:var(--muted);
    font-size:13px;
  }

  /* --- 新增表單 --- */
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  input[type=number], input[type=date], input[type=text]{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#FBFAF6;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--ink);
  }
  input[type=number]{
    font-family:'Fraunces',serif;
    font-size:22px;
    font-weight:600;
  }
  input:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#FBFAF6;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    user-select:none;
  }
  .chip.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .method-row{
    display:flex;
    gap:8px;
  }
  .method-row .chip{
    flex:1;
    text-align:center;
  }
  button.submit{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:4px;
  }
  button.submit:disabled{
    background:var(--muted);
    cursor:default;
  }
  .status-msg{
    font-size:13px;
    margin-top:10px;
    color:var(--muted);
  }
  .status-msg.error{ color:var(--warn); }
  .status-msg.ok{ color:var(--accent); }

  /* --- 最近紀錄 --- */
  .entry-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .entry-row:last-child{ border-bottom:none; }
  .entry-row .left .cat{
    font-weight:600;
  }
  .entry-row .left .meta{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .entry-row .amount{
    font-variant-numeric:tabular-nums;
    font-weight:600;
  }

  .setup-warning{
    background:#FBEDE7;
    border:1px solid var(--warn);
    color:var(--warn);
    padding:14px 16px;
    border-radius:12px;
    font-size:13px;
    margin-bottom:16px;
    line-height:1.5;
  }
  .setup-warning code{
    background:rgba(0,0,0,0.06);
    padding:1px 5px;
    border-radius:4px;
  }

  /* --- 首次設定畫面 --- */
  .setup-screen{
    max-width:400px;
    margin:60px auto 0;
    padding:0 18px;
  }
  .setup-screen h1{
    font-family:'Fraunces',serif;
    font-size:24px;
    margin-bottom:6px;
  }
  .setup-screen p{
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
    margin-bottom:20px;
  }
  .setup-link{
    display:inline-block;
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
    text-decoration:underline;
  }
</style>
</head>
<body>

<div id="setupScreen" class="setup-screen" style="display:none;">
  <h1>記帳</h1>
  <p>第一次使用，請貼上 Google Apps Script 的網址跟你自己設定的密碼。這些資料只會存在這個瀏覽器裡，不會上傳到任何地方，之後打開不用再輸入一次。</p>
  <div class="panel">
    <div class="field">
      <label>Apps Script 網址（.../exec 結尾）</label>
      <input type="text" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="field">
      <label>密碼（跟 Apps Script 裡 TOKEN 設的一樣）</label>
      <input type="text" id="setupToken" placeholder="你在 Apps Script 設的那串亂碼">
    </div>
    <button class="submit" id="setupSaveBtn">儲存並開始使用</button>
    <div class="status-msg" id="setupStatusMsg"></div>
  </div>
</div>

<div id="mainApp" class="app" style="display:none;">

  <header>
    <h1>記帳</h1>
    <div class="today" id="todayLabel"></div>
  </header>

  <div class="panel hero">
    <div class="label">本月花費</div>
    <div class="amount" id="monthTotal">NT$ 0</div>
    <div class="sub" id="monthCount">本月尚無紀錄</div>
  </div>

  <div class="panel add-form">
    <h2>新增一筆</h2>
    <div class="field">
      <label>金額</label>
      <input type="number" id="amountInput" inputmode="decimal" placeholder="0">
    </div>
    <div class="field">
      <label>分類</label>
      <div class="chip-row" id="categoryChips"></div>
    </div>
    <div class="field">
      <label>付款方式</label>
      <div class="method-row" id="methodChips"></div>
    </div>
    <div class="field">
      <label>日期</label>
      <input type="date" id="dateInput">
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input type="text" id="noteInput" placeholder="例如：和同事吃午餐">
    </div>
    <button class="submit" id="submitBtn">記下這筆</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="panel breakdown">
    <h2>本月分類花費</h2>
    <div id="breakdownList"></div>
  </div>

  <div class="panel recent">
    <h2>最近紀錄</h2>
    <div id="recentList"></div>
  </div>

  <div class="setup-link" id="resetLink">重設連線設定</div>

</div>

<script>
const CATEGORIES = ["餐飲","交通","娛樂","居住","購物","醫療","其他"];
const METHODS = ["現金","金融卡"];

let entries = [];
let selectedCategory = CATEGORIES[0];
let selectedMethod = METHODS[0];
let SCRIPT_URL = localStorage.getItem('expenseScriptUrl') || '';
let TOKEN = localStorage.getItem('expenseToken') || '';

const el = (id) => document.getElementById(id);

function withToken(url){
  const sep = url.indexOf('?') === -1 ? '?' : '&';
  return url + sep + 'token=' + encodeURIComponent(TOKEN);
}

function initSetupScreen(){
  el('setupSaveBtn').onclick = () => {
    const url = el('setupUrl').value.trim();
    const token = el('setupToken').value.trim();
    const msg = el('setupStatusMsg');
    if(!url || !token){
      msg.textContent = '網址跟密碼都要填喔。';
      msg.className = 'status-msg error';
      return;
    }
    localStorage.setItem('expenseScriptUrl', url);
    localStorage.setItem('expenseToken', token);
    SCRIPT_URL = url;
    TOKEN = token;
    el('setupScreen').style.display = 'none';
    el('mainApp').style.display = 'block';
    initUI();
  };
}

function fmt(n){
  return "NT$ " + Math.round(n).toLocaleString('zh-TW');
}

function todayStr(){
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function initUI(){
  el('todayLabel').textContent = new Date().toLocaleDateString('zh-TW', { month:'long', day:'numeric', weekday:'short' });
  el('dateInput').value = todayStr();

  const catBox = el('categoryChips');
  CATEGORIES.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (cat === selectedCategory ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => {
      selectedCategory = cat;
      [...catBox.children].forEach(c => c.classList.toggle('active', c.textContent === cat));
    };
    catBox.appendChild(chip);
  });

  const methodBox = el('methodChips');
  METHODS.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (m === selectedMethod ? ' active' : '');
    chip.textContent = m;
    chip.onclick = () => {
      selectedMethod = m;
      [...methodBox.children].forEach(c => c.classList.toggle('active', c.textContent === m));
    };
    methodBox.appendChild(chip);
  });

  el('submitBtn').onclick = submitEntry;
  el('resetLink').onclick = () => {
    if(confirm('確定要清除已儲存的網址跟密碼嗎？清除後要重新輸入一次。')){
      localStorage.removeItem('expenseScriptUrl');
      localStorage.removeItem('expenseToken');
      location.reload();
    }
  };

  loadEntries();
}

async function loadEntries(){
  try{
    const res = await fetch(withToken(SCRIPT_URL));
    const json = await res.json();
    if(json && json.error){
      el('statusMsg').textContent = '密碼或網址不正確，請點下方「重設連線設定」重新輸入。';
      el('statusMsg').className = 'status-msg error';
      return;
    }
    entries = json;
    render();
  }catch(err){
    el('statusMsg').textContent = '讀取資料失敗，請確認網址是否正確，或稍後再試一次。';
    el('statusMsg').className = 'status-msg error';
  }
}

function render(){
  const now = new Date();
  const ym = now.toISOString().slice(0,7); // yyyy-mm

  const monthEntries = entries.filter(e => (e.date || '').slice(0,7) === ym);
  const total = monthEntries.reduce((s,e) => s + Number(e.amount || 0), 0);

  el('monthTotal').textContent = fmt(total);
  el('monthCount').textContent = monthEntries.length
    ? `共 ${monthEntries.length} 筆紀錄`
    : '本月尚無紀錄';

  // 分類加總
  const catTotals = {};
  monthEntries.forEach(e => {
    catTotals[e.category] = (catTotals[e.category] || 0) + Number(e.amount || 0);
  });
  const sortedCats = Object.entries(catTotals).sort((a,b) => b[1]-a[1]);
  const maxVal = sortedCats.length ? sortedCats[0][1] : 1;

  const breakdownBox = el('breakdownList');
  breakdownBox.innerHTML = '';
  if(sortedCats.length === 0){
    breakdownBox.innerHTML = '<div class="empty-note">本月還沒有花費資料，記下第一筆吧。</div>';
  } else {
    sortedCats.forEach(([cat, val]) => {
      const row = document.createElement('div');
      row.className = 'bar-row';
      row.innerHTML = `
        <div class="cat-name">${cat}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${(val/maxVal*100).toFixed(0)}%"></div></div>
        <div class="cat-amount">${fmt(val)}</div>
      `;
      breakdownBox.appendChild(row);
    });
  }

  // 最近紀錄（全部資料裡取最新 8 筆）
  const recentBox = el('recentList');
  recentBox.innerHTML = '';
  const recent = [...entries].sort((a,b) => (b.date||'').localeCompare(a.date||'')).slice(0,8);
  if(recent.length === 0){
    recentBox.innerHTML = '<div class="empty-note">尚無紀錄。</div>';
  } else {
    recent.forEach(e => {
      const row = document.createElement('div');
      row.className = 'entry-row';
      row.innerHTML = `
        <div class="left">
          <div class="cat">${e.category}</div>
          <div class="meta">${e.date} · ${e.method}${e.note ? ' · ' + e.note : ''}</div>
        </div>
        <div class="amount">${fmt(e.amount)}</div>
      `;
      recentBox.appendChild(row);
    });
  }
}

async function submitEntry(){
  const amount = parseFloat(el('amountInput').value);
  const date = el('dateInput').value || todayStr();
  const note = el('noteInput').value.trim();
  const statusMsg = el('statusMsg');

  if(!amount || amount <= 0){
    statusMsg.textContent = '請輸入有效的金額。';
    statusMsg.className = 'status-msg error';
    return;
  }

  const payload = { date, amount, category: selectedCategory, method: selectedMethod, note, token: TOKEN };
  const btn = el('submitBtn');
  btn.disabled = true;
  btn.textContent = '記錄中…';

  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    entries.push(payload);
    render();
    el('amountInput').value = '';
    el('noteInput').value = '';
    statusMsg.textContent = '已記下這筆。';
    statusMsg.className = 'status-msg ok';
    loadEntries(); // 背景同步一次，確保跟表格一致
  }catch(err){
    statusMsg.textContent = '新增失敗，請檢查網路連線後再試一次。';
    statusMsg.className = 'status-msg error';
  }finally{
    btn.disabled = false;
    btn.textContent = '記下這筆';
  }
}

initSetupScreen();
if(SCRIPT_URL && TOKEN){
  el('mainApp').style.display = 'block';
  initUI();
} else {
  el('setupScreen').style.display = 'block';
}
</script>
</body>
</html>
