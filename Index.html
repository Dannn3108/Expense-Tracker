<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>記帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F2EFE6;
    --panel:#FFFFFF;
    --ink:#20261F;
    --muted:#6F7568;
    --accent:#3E6B52;
    --accent-soft:#E4EDE6;
    --warn:#B5502E;
    --line:#E2DDCC;
    --radius:18px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:'Inter',sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .app{
    max-width:460px;
    margin:0 auto;
    padding:28px 18px 60px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:22px;
  }
  header h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:26px;
    margin:0;
    letter-spacing:-0.01em;
  }
  header .today{
    font-size:13px;
    color:var(--muted);
  }
  .panel{
    background:var(--panel);
    border-radius:var(--radius);
    padding:22px 20px;
    margin-bottom:16px;
    border:1px solid var(--line);
  }
  .hero .label{
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.04em;
  }
  .hero .amount{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:38px;
    line-height:1.1;
    margin:4px 0 12px;
    font-variant-numeric:tabular-nums;
  }
  .hero-list{
    border-top:1px solid var(--line);
    padding-top:8px;
  }
  .hero-row{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    padding:6px 0;
  }
  .hero-row .cat{
    font-weight:600;
    margin-right:6px;
  }
  .hero-row .meta{
    color:var(--muted);
  }
  .hero-row .amt{
    font-weight:600;
    font-variant-numeric:tabular-nums;
  }
  .breakdown h2, .recent h2, .add-form h2{
    font-family:'Fraunces',serif;
    font-size:16px;
    font-weight:600;
    margin:0 0 14px;
  }
  .tab-row{
    display:flex;
    gap:6px;
    margin-bottom:16px;
  }
  .tab{
    flex:1;
    text-align:center;
    padding:8px;
    border-radius:999px;
    font-size:13px;
    cursor:pointer;
    border:1px solid var(--line);
    background:#FBFAF6;
    color:var(--ink);
  }
  .tab.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .period-total{
    font-size:12px;
    color:var(--muted);
    margin-bottom:14px;
  }
  .period-total span{
    font-family:'Fraunces',serif;
    font-weight:700;
    font-size:20px;
    color:var(--ink);
    margin-left:6px;
  }
  .section-label{
    font-size:12px;
    color:var(--muted);
    margin:16px 0 10px;
  }
  .bar-row{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:10px;
    font-size:13px;
  }
  .bar-row .cat-name{
    width:56px;
    flex-shrink:0;
  }
  .bar-track{
    flex:1;
    height:10px;
    background:var(--accent-soft);
    border-radius:6px;
    overflow:hidden;
  }
  .bar-fill{
    height:100%;
    border-radius:6px;
  }
  .bar-row .cat-amount{
    width:64px;
    text-align:right;
    flex-shrink:0;
    color:var(--muted);
    font-variant-numeric:tabular-nums;
  }
  .empty-note{
    color:var(--muted);
    font-size:13px;
  }
  .trend-chart{
    display:flex;
    align-items:flex-end;
    gap:6px;
    height:90px;
    margin-top:6px;
  }
  .trend-col{
    flex:1;
    height:100%;
    display:flex;
    flex-direction:column-reverse;
  }
  .trend-bar{
    width:100%;
    display:flex;
    flex-direction:column-reverse;
    border-radius:3px 3px 0 0;
    overflow:hidden;
  }
  .trend-empty{
    width:100%;
    height:3px;
    background:var(--accent-soft);
    border-radius:2px;
  }
  .trend-totals, .trend-labels{
    display:flex;
    gap:6px;
  }
  .trend-totals div, .trend-labels div{
    flex:1;
    text-align:center;
    font-size:10px;
  }
  .trend-totals div{
    font-weight:600;
    margin-top:4px;
  }
  .trend-labels div{
    color:var(--muted);
    line-height:1.4;
    margin-top:2px;
  }
  .legend{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:14px;
    padding-top:12px;
    border-top:1px solid var(--line);
  }
  .legend-item{
    display:flex;
    align-items:center;
    gap:5px;
    font-size:11px;
    color:var(--muted);
  }
  .legend-dot{
    width:8px;
    height:8px;
    border-radius:50%;
    display:inline-block;
  }
  .field{
    margin-bottom:14px;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--muted);
    margin-bottom:6px;
  }
  input[type=number], input[type=text]{
    width:100%;
    padding:11px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    background:#FBFAF6;
    font-family:'Inter',sans-serif;
    font-size:15px;
    color:var(--ink);
  }
  input[type=number]{
    font-family:'Fraunces',serif;
    font-size:22px;
    font-weight:600;
  }
  input:focus{
    outline:2px solid var(--accent);
    outline-offset:1px;
  }
  .chip-row{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .chip{
    padding:8px 14px;
    border-radius:999px;
    border:1px solid var(--line);
    background:#FBFAF6;
    font-size:13px;
    color:var(--ink);
    cursor:pointer;
    user-select:none;
  }
  .chip.active{
    background:var(--accent);
    border-color:var(--accent);
    color:#fff;
  }
  .method-row{
    display:flex;
    gap:8px;
  }
  .method-row .chip{
    flex:1;
    text-align:center;
  }
  button.submit{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:var(--ink);
    color:#fff;
    font-size:15px;
    font-weight:600;
    cursor:pointer;
    margin-top:4px;
  }
  button.submit:disabled{
    background:var(--muted);
    cursor:default;
  }
  .status-msg{
    font-size:13px;
    margin-top:10px;
    color:var(--muted);
  }
  .status-msg.error{ color:var(--warn); }
  .status-msg.ok{ color:var(--accent); }
  .entry-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:10px 0;
    border-bottom:1px solid var(--line);
    font-size:14px;
  }
  .entry-row:last-child{ border-bottom:none; }
  .entry-row .left .cat{
    font-weight:600;
  }
  .entry-row .left .meta{
    font-size:12px;
    color:var(--muted);
    margin-top:2px;
  }
  .entry-row .amount{
    font-variant-numeric:tabular-nums;
    font-weight:600;
  }
  .setup-screen{
    max-width:400px;
    margin:60px auto 0;
    padding:0 18px;
  }
  .setup-screen h1{
    font-family:'Fraunces',serif;
    font-size:24px;
    margin-bottom:6px;
  }
  .setup-screen p{
    color:var(--muted);
    font-size:14px;
    line-height:1.6;
    margin-bottom:20px;
  }
  .setup-link{
    display:inline-block;
    margin-top:10px;
    font-size:12px;
    color:var(--muted);
    cursor:pointer;
    text-decoration:underline;
  }
</style>
</head>
<body>

<div id="setupScreen" class="setup-screen" style="display:none;">
  <h1>記帳</h1>
  <p>第一次使用，請貼上 Google Apps Script 的網址跟你自己設定的密碼。這些資料只會存在這個瀏覽器裡，不會上傳到任何地方，之後打開不用再輸入一次。</p>
  <div class="panel">
    <div class="field">
      <label>Apps Script 網址（.../exec 結尾）</label>
      <input type="text" id="setupUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="field">
      <label>密碼（跟 Apps Script 裡 TOKEN 設的一樣）</label>
      <input type="text" id="setupToken" placeholder="你在 Apps Script 設的那串亂碼">
    </div>
    <button class="submit" id="setupSaveBtn">儲存並開始使用</button>
    <div class="status-msg" id="setupStatusMsg"></div>
  </div>
</div>

<div id="mainApp" class="app" style="display:none;">

  <header>
    <h1>記帳</h1>
    <div class="today" id="todayLabel"></div>
  </header>

  <div class="panel hero">
    <div class="label">今日花費</div>
    <div class="amount" id="todayTotal">NT$ 0</div>
    <div class="hero-list" id="todayList"></div>
  </div>

  <div class="panel add-form">
    <h2>新增一筆</h2>
    <div class="field">
      <label>金額</label>
      <input type="number" id="amountInput" inputmode="decimal" placeholder="0">
    </div>
    <div class="field">
      <label>分類</label>
      <div class="chip-row" id="categoryChips"></div>
    </div>
    <div class="field">
      <label>付款方式</label>
      <div class="method-row" id="methodChips"></div>
    </div>
    <div class="field">
      <label>備註（選填）</label>
      <input type="text" id="noteInput" placeholder="例如：和同事吃午餐">
    </div>
    <button class="submit" id="submitBtn">記下這筆</button>
    <div class="status-msg" id="statusMsg"></div>
  </div>

  <div class="panel breakdown">
    <h2>花費分析</h2>
    <div class="tab-row">
      <div class="tab active" id="tabWeek">週</div>
      <div class="tab" id="tabMonth">月</div>
    </div>
    <div class="period-total" id="periodTotalLabel">本週合計 <span id="periodTotalAmt">NT$ 0</span></div>

    <div class="section-label">分類花費</div>
    <div id="catBars"></div>

    <div class="section-label" id="trendSectionLabel">每日花費趨勢</div>
    <div class="trend-chart" id="trendChart"></div>
    <div class="trend-totals" id="trendTotals"></div>
    <div class="trend-labels" id="trendLabels"></div>

    <div class="legend" id="legend"></div>
  </div>

  <div class="panel recent">
    <h2>最近紀錄</h2>
    <div id="recentList"></div>
  </div>

  <div class="setup-link" id="resetLink">重設連線設定</div>

</div>

<script>
const CATEGORIES = ["餐飲","交通","娛樂","住宿","生活雜支","學習","其他"];
const METHODS = ["現金","金融卡"];
const CAT_COLORS = {
  "餐飲":"#B8543A",
  "交通":"#435A8C",
  "娛樂":"#9A4570",
  "住宿":"#C79A46",
  "生活雜支":"#2F8A80",
  "學習":"#6B8A55",
  "其他":"#8C8577"
};
const WEEKDAY_LABELS = ["一","二","三","四","五","六","日"];

let entries = [];
let selectedCategory = CATEGORIES[0];
let selectedMethod = METHODS[0];
let currentTab = 'week';
let SCRIPT_URL = localStorage.getItem('expenseScriptUrl') || '';
let TOKEN = localStorage.getItem('expenseToken') || '';

const el = (id) => document.getElementById(id);

function pad(n){ return String(n).padStart(2,'0'); }

function taipeiParts(ms){
  const shifted = new Date((ms !== undefined ? ms : Date.now()) + 8*3600*1000);
  return {
    y: shifted.getUTCFullYear(),
    m: shifted.getUTCMonth()+1,
    day: shifted.getUTCDate(),
    h: shifted.getUTCHours(),
    min: shifted.getUTCMinutes(),
    sec: shifted.getUTCSeconds(),
    weekday: shifted.getUTCDay()
  };
}

function taipeiTimestampString(){
  const p = taipeiParts();
  return p.y+'-'+pad(p.m)+'-'+pad(p.day)+' '+pad(p.h)+':'+pad(p.min)+':'+pad(p.sec);
}

function dateFromYMD(y,m,d){ return new Date(Date.UTC(y, m-1, d)); }
function addDays(d,n){ return new Date(d.getTime() + n*86400000); }
function ymdStr(d){ return d.getUTCFullYear()+'-'+pad(d.getUTCMonth()+1)+'-'+pad(d.getUTCDate()); }
function mdStr(d){ return (d.getUTCMonth()+1)+'/'+d.getUTCDate(); }

function fmt(n){
  return "NT$ " + Math.round(n).toLocaleString('zh-TW');
}

function withToken(url){
  const sep = url.indexOf('?') === -1 ? '?' : '&';
  return url + sep + 'token=' + encodeURIComponent(TOKEN);
}

function initSetupScreen(){
  el('setupSaveBtn').onclick = () => {
    const url = el('setupUrl').value.trim();
    const token = el('setupToken').value.trim();
    const msg = el('setupStatusMsg');
    if(!url || !token){
      msg.textContent = '網址跟密碼都要填喔。';
      msg.className = 'status-msg error';
      return;
    }
    localStorage.setItem('expenseScriptUrl', url);
    localStorage.setItem('expenseToken', token);
    SCRIPT_URL = url;
    TOKEN = token;
    el('setupScreen').style.display = 'none';
    el('mainApp').style.display = 'block';
    initUI();
  };
}

function initUI(){
  const p = taipeiParts();
  const wLabel = ["日","一","二","三","四","五","六"][p.weekday];
  el('todayLabel').textContent = p.m + '月' + p.day + '日週' + wLabel;

  const catBox = el('categoryChips');
  CATEGORIES.forEach(cat => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (cat === selectedCategory ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = () => {
      selectedCategory = cat;
      [...catBox.children].forEach(c => c.classList.toggle('active', c.textContent === cat));
    };
    catBox.appendChild(chip);
  });

  const methodBox = el('methodChips');
  METHODS.forEach(m => {
    const chip = document.createElement('div');
    chip.className = 'chip' + (m === selectedMethod ? ' active' : '');
    chip.textContent = m;
    chip.onclick = () => {
      selectedMethod = m;
      [...methodBox.children].forEach(c => c.classList.toggle('active', c.textContent === m));
    };
    methodBox.appendChild(chip);
  });

  el('submitBtn').onclick = submitEntry;
  el('tabWeek').onclick = () => setTab('week');
  el('tabMonth').onclick = () => setTab('month');
  el('resetLink').onclick = () => {
    if(confirm('確定要清除已儲存的網址跟密碼嗎？清除後要重新輸入一次。')){
      localStorage.removeItem('expenseScriptUrl');
      localStorage.removeItem('expenseToken');
      location.reload();
    }
  };

  loadEntries();
}

function setTab(tab){
  currentTab = tab;
  el('tabWeek').classList.toggle('active', tab === 'week');
  el('tabMonth').classList.toggle('active', tab === 'month');
  el('trendSectionLabel').textContent = tab === 'week' ? '每日花費趨勢' : '每週花費趨勢';
  render();
}

async function loadEntries(){
  try{
    const res = await fetch(withToken(SCRIPT_URL));
    const json = await res.json();
    if(json && json.error){
      el('statusMsg').textContent = '密碼或網址不正確，請點下方「重設連線設定」重新輸入。';
      el('statusMsg').className = 'status-msg error';
      return;
    }
    entries = json;
    render();
  }catch(err){
    el('statusMsg').textContent = '讀取資料失敗，請確認網址是否正確，或稍後再試一次。';
    el('statusMsg').className = 'status-msg error';
  }
}

function dateOnly(entry){
  return (entry.timestamp || '').slice(0,10);
}

function timeOnly(entry){
  return (entry.timestamp || '').slice(11,16);
}

function sumByCategory(list){
  const totals = {};
  list.forEach(e => {
    totals[e.category] = (totals[e.category] || 0) + Number(e.amount || 0);
  });
  return totals;
}

function renderCatBars(list){
  const totals = sumByCategory(list);
  const sorted = Object.entries(totals).sort((a,b) => b[1]-a[1]);
  const max = sorted.length ? sorted[0][1] : 1;
  const box = el('catBars');
  box.innerHTML = '';
  if(sorted.length === 0){
    box.innerHTML = '<div class="empty-note">這段期間還沒有花費資料。</div>';
    return;
  }
  sorted.forEach(([cat, val]) => {
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML =
      '<div class="cat-name">' + cat + '</div>' +
      '<div class="bar-track"><div class="bar-fill" style="width:' + (val/max*100).toFixed(0) + '%;background:' + (CAT_COLORS[cat]||'#999') + ';"></div></div>' +
      '<div class="cat-amount">' + fmt(val) + '</div>';
    box.appendChild(row);
  });
}

function renderTrend(buckets){
  const totals = buckets.map(b => Object.values(b.cats).reduce((s,v)=>s+v,0));
  const maxTotal = Math.max(...totals, 1);
  const chart = el('trendChart');
  const totalsBox = el('trendTotals');
  const labelsBox = el('trendLabels');
  chart.innerHTML = ''; totalsBox.innerHTML = ''; labelsBox.innerHTML = '';
  const usedCats = new Set();

  buckets.forEach((b, i) => {
    const t = totals[i];
    const col = document.createElement('div');
    col.className = 'trend-col';
    if(t === 0){
      const empty = document.createElement('div');
      empty.className = 'trend-empty';
      col.appendChild(empty);
    } else {
      const barH = Math.round((t / maxTotal) * 100);
      const bar = document.createElement('div');
      bar.className = 'trend-bar';
      bar.style.height = barH + '%';
      Object.entries(b.cats).forEach(([cat, val]) => {
        usedCats.add(cat);
        const seg = document.createElement('div');
        seg.style.height = Math.round((val/t)*100) + '%';
        seg.style.background = CAT_COLORS[cat] || '#999';
        bar.appendChild(seg);
      });
      col.appendChild(bar);
    }
    chart.appendChild(col);

    const tl = document.createElement('div');
    tl.textContent = t;
    totalsBox.appendChild(tl);

    const ll = document.createElement('div');
    ll.innerHTML = b.label;
    labelsBox.appendChild(ll);
  });

  const legend = el('legend');
  legend.innerHTML = '';
  CATEGORIES.forEach(cat => {
    if(!usedCats.has(cat)) return;
    const item = document.createElement('div');
    item.className = 'legend-item';
    item.innerHTML = '<span class="legend-dot" style="background:' + CAT_COLORS[cat] + ';"></span>' + cat;
    legend.appendChild(item);
  });
}

function getWeekRange(){
  const p = taipeiParts();
  const today = dateFromYMD(p.y, p.m, p.day);
  const weekday = today.getUTCDay();
  const mondayOffset = weekday === 0 ? -6 : -(weekday - 1);
  const monday = addDays(today, mondayOffset);
  return monday;
}

function renderWeek(){
  const monday = getWeekRange();
  const days = [];
  for(let i=0;i<7;i++){
    const d = addDays(monday, i);
    days.push({ start: d, end: d, label: WEEKDAY_LABELS[i] + '<br>' + mdStr(d) });
  }
  const buckets = days.map(d => {
    const ds = ymdStr(d.start);
    const dayEntries = entries.filter(e => dateOnly(e) === ds);
    return { label: d.label, cats: sumByCategory(dayEntries) };
  });
  const weekEntries = entries.filter(e => {
    const ds = dateOnly(e);
    return ds >= ymdStr(monday) && ds <= ymdStr(addDays(monday,6));
  });
  renderCatBars(weekEntries);
  renderTrend(buckets);
  const total = weekEntries.reduce((s,e)=>s+Number(e.amount||0),0);
  el('periodTotalLabel').innerHTML = '本週合計 <span id="periodTotalAmt">' + fmt(total) + '</span>';
}

function renderMonth(){
  const p = taipeiParts();
  const monthStart = dateFromYMD(p.y, p.m, 1);
  const monthEnd = addDays(dateFromYMD(p.y, p.m+1, 1), -1);
  const buckets = [];
  let cursor = monthStart;
  while(cursor.getTime() <= monthEnd.getTime()){
    const weekday = cursor.getUTCDay();
    const daysToSunday = weekday === 0 ? 0 : 7 - weekday;
    let end = addDays(cursor, daysToSunday);
    if(end.getTime() > monthEnd.getTime()) end = monthEnd;
    buckets.push({ start: cursor, end: end });
    cursor = addDays(end, 1);
  }
  const bucketData = buckets.map(b => {
    const s = ymdStr(b.start), e = ymdStr(b.end);
    const list = entries.filter(en => dateOnly(en) >= s && dateOnly(en) <= e);
    const label = (s === e) ? mdStr(b.start) : (mdStr(b.start) + '-' + mdStr(b.end));
    return { label, cats: sumByCategory(list) };
  });
  const monthEntries = entries.filter(e => {
    const ds = dateOnly(e);
    return ds >= ymdStr(monthStart) && ds <= ymdStr(monthEnd);
  });
  renderCatBars(monthEntries);
  renderTrend(bucketData);
  const total = monthEntries.reduce((s,e)=>s+Number(e.amount||0),0);
  el('periodTotalLabel').innerHTML = '本月合計 <span id="periodTotalAmt">' + fmt(total) + '</span>';
}

function render(){
  const p = taipeiParts();
  const today = ymdStr(dateFromYMD(p.y, p.m, p.day));
  const todayEntries = entries.filter(e => dateOnly(e) === today).sort((a,b) => b.timestamp.localeCompare(a.timestamp));
  const todayTotal = todayEntries.reduce((s,e)=>s+Number(e.amount||0),0);
  el('todayTotal').textContent = fmt(todayTotal);
  const listBox = el('todayList');
  listBox.innerHTML = '';
  if(todayEntries.length === 0){
    listBox.innerHTML = '<div class="empty-note">今天還沒有花費紀錄。</div>';
  } else {
    todayEntries.forEach(e => {
      const row = document.createElement('div');
      row.className = 'hero-row';
      row.innerHTML =
        '<div><span class="cat">' + e.category + '</span><span class="meta">' + timeOnly(e) + (e.note ? ' · ' + e.note : '') + '</span></div>' +
        '<div class="amt">' + fmt(e.amount) + '</div>';
      listBox.appendChild(row);
    });
  }

  if(currentTab === 'week') renderWeek(); else renderMonth();

  const recentBox = el('recentList');
  recentBox.innerHTML = '';
  const recent = [...entries].sort((a,b) => (b.timestamp||'').localeCompare(a.timestamp||'')).slice(0,8);
  if(recent.length === 0){
    recentBox.innerHTML = '<div class="empty-note">尚無紀錄。</div>';
  } else {
    recent.forEach(e => {
      const ts = e.timestamp || '';
      const display = ts.length >= 16 ? (mdStrFromString(ts) + ' ' + ts.slice(11,16)) : ts;
      const row = document.createElement('div');
      row.className = 'entry-row';
      row.innerHTML =
        '<div class="left"><div class="cat">' + e.category + '</div>' +
        '<div class="meta">' + display + ' · ' + e.method + (e.note ? ' · ' + e.note : '') + '</div></div>' +
        '<div class="amount">' + fmt(e.amount) + '</div>';
      recentBox.appendChild(row);
    });
  }
}

function mdStrFromString(ts){
  const m = parseInt(ts.slice(5,7),10);
  const d = parseInt(ts.slice(8,10),10);
  return m + '/' + d;
}

async function submitEntry(){
  const amount = parseFloat(el('amountInput').value);
  const note = el('noteInput').value.trim();
  const statusMsg = el('statusMsg');

  if(!amount || amount <= 0){
    statusMsg.textContent = '請輸入有效的金額。';
    statusMsg.className = 'status-msg error';
    return;
  }

  const payload = {
    timestamp: taipeiTimestampString(),
    amount, category: selectedCategory, method: selectedMethod, note, token: TOKEN
  };
  const btn = el('submitBtn');
  btn.disabled = true;
  btn.textContent = '記錄中…';

  try{
    await fetch(SCRIPT_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    entries.push(payload);
    render();
    el('amountInput').value = '';
    el('noteInput').value = '';
    statusMsg.textContent = '已記下這筆。';
    statusMsg.className = 'status-msg ok';
    loadEntries();
  }catch(err){
    statusMsg.textContent = '新增失敗，請檢查網路連線後再試一次。';
    statusMsg.className = 'status-msg error';
  }finally{
    btn.disabled = false;
    btn.textContent = '記下這筆';
  }
}

initSetupScreen();
if(SCRIPT_URL && TOKEN){
  el('mainApp').style.display = 'block';
  initUI();
} else {
  el('setupScreen').style.display = 'block';
}
</script>
